name: Auto Linter

on:
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout/Clone the code
        uses: actions/checkout@v7
      # this step will install the linting tool
      - name: Install linter
        run: pip install ruff
      # this step will run the linter
      - name: Run the linter
        run: ruff check .
        
      
